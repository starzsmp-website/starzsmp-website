<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarzSMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(180deg,#050816,#0b1026);
color:white;
overflow-x:hidden;
}
.stars{
position:fixed;inset:0;
background-image:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 40px 70px,#ffd700,transparent),
radial-gradient(1px 1px at 90px 40px,#fff,transparent),
radial-gradient(2px 2px at 130px 80px,#9fd3ff,transparent);
background-size:200px 200px;
opacity:.5;
z-index:-1;
}
.hero{
text-align:center;
padding:100px 20px;
}
.hero h1{
font-size:4rem;
color:#ffd700;
text-shadow:0 0 20px #ffd700;
}
.hero p{font-size:1.2rem;margin-top:15px}
.ip{
margin:20px auto;
padding:15px;
width:max-content;
border:2px solid gold;
border-radius:12px;
background:rgba(255,255,255,.05);
}
.btn{
display:inline-block;
margin:10px;
padding:14px 24px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
background:linear-gradient(45deg,#ffd700,#ffae00);
color:black;
}
.section{padding:60px 20px;max-width:1200px;margin:auto}
.section h2{text-align:center;color:#ffd700;margin-bottom:30px}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}
.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(8px);
border:1px solid rgba(255,215,0,.4);
border-radius:18px;
padding:25px;
text-align:center;
box-shadow:0 0 20px rgba(255,215,0,.15);
}
.card h3{color:#ffd700}
.price{font-size:2rem;margin:15px 0}
.rank-star{font-size:2rem}
.discord{
text-align:center;
background:rgba(88,101,242,.15);
padding:40px;
border-radius:20px;
}
footer{text-align:center;padding:25px;color:#bbb}
</style>
</head>
<body>
<div class="stars"></div>

<section class="hero">
<h1>⭐ StarzSMP ⭐</h1>
<p>Java + Bedrock Survival Server</p>
<div class="ip">IP: Starz.smp.live</div>
<a class="btn" href="https://discord.gg/dSH4rzPsYh">Join Discord</a>
</section>

<section class="section">
<h2>🌟 Server Store</h2>
<div class="grid">
<div class="card"><div class="rank-star">✨</div><h3>VIP</h3><div class="price">$4.99</div></div>
<div class="card"><div class="rank-star">⭐</div><h3>Elite</h3><div class="price">$9.99</div></div>
<div class="card"><div class="rank-star">🌠</div><h3>Legend</h3><div class="price">$19.99</div></div>
<div class="card"><div class="rank-star">☄️</div><h3>Titan</h3><div class="price">$29.99</div></div>
<div class="card"><div class="rank-star">🌌</div><h3>Starz</h3><div class="price">$49.99</div></div>
</div>
</section>

<section class="section">
<div class="discord">
<h2>💬 Join Our Discord</h2>
<p>Announcements • Giveaways • Events • Support</p>
<br>
<a class="btn" href="https://discord.gg/dSH4rzPsYh">Join Now</a>
</div>
</section>

<footer>© 2026 StarzSMP</footer>
</body>
</html>
